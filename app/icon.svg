<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#2d6a4f"/>
  
  <!-- Centered Mountain Base -->
  <polygon points="256,120 76,400 436,400" fill="#74c69d"/>
  
  <!-- Right Mountain -->
  <polygon points="370,220 250,400 490,400" fill="#52b788"/>
  
  <!-- Snow Cap Center -->
  <polygon points="256,120 200,207 256,230 312,207" fill="#d8f3dc"/>
  
  <!-- Track -->
  <polyline points="100,380 180,310 256,360 350,280 412,330" fill="none" stroke="#000000" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Start Indicator (Green) -->
  <circle cx="100" cy="380" r="16" fill="#a3b18a"/>
  
  <!-- Stop Indicator (Red) -->
  <circle cx="412" cy="330" r="16" fill="#e07a5f"/>
</svg>
